apiVersion: v1
kind: Service
metadata:
  name: mysql-despachos             
spec:
  type: ClusterIP
  selector:
    app: despachos-db
  ports:
    - protocol: TCP
      port: 3306               
      targetPort: 3306         
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-despachos-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: despachos-db
  template:
    metadata:
      labels:
        app: despachos-db
    spec:
      containers:
        - name: mysql-despachos
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
            - name: MYSQL_DATABASE
              value: "DESPACHOS"
          ports: 
            - containerPort: 3306 
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi"
              cpu: "500m"